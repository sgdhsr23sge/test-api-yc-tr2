services:
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./services/api-gateway/.env
    depends_on:
      - user-service
      - product-service
      - order-service
      - notification-service
      - postgres
      - redis

  user-service:
    build: ./services/user-service
    ports:
      - "3001:3001"
    env_file:
      - ./services/user-service/.env
    depends_on:
      - postgres
      - redis

  product-service:
    build: ./services/product-service
    ports:
      - "3002:3002"
    env_file:
      - ./services/product-service/.env
    depends_on:
      - postgres
      - redis

  order-service:
    build: ./services/order-service
    ports:
      - "3003:3003"
    env_file:
      - ./services/order-service/.env
    depends_on:
      - postgres
      - redis

  notification-service:
    build: ./services/notification-service
    ports:
      - "3004:3004"
    env_file:
      - ./services/notification-service/.env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
